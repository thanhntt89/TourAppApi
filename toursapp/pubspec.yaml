name: stoneecho
description: "StoneEcho — Self-guided audio tour app for Ha Giang, Vietnam"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.12.0

dependencies:
  audio_service: ^0.18.15
  cached_network_image: ^3.4.1
  connectivity_plus: ^6.1.1
  dio: ^5.7.0
  drift: ^2.22.1
  firebase_analytics: ^11.3.6
  firebase_core: ^3.8.1
  flutter:
    sdk: flutter
  flutter_animate: ^4.5.2
  flutter_localizations:
    sdk: flutter
  flutter_map: ^7.0.2
  flutter_map_tile_caching: ^9.1.3
  flutter_riverpod: ^3.0.0
  flutter_svg: ^2.0.16
  freezed_annotation: ^3.0.0
  geolocator: ^13.0.2
  go_router: ^14.6.2
  google_fonts: ^8.1.0
  intl: ^0.20.2
  json_annotation: ^4.9.0
  just_audio: ^0.9.42
  latlong2: ^0.9.1
  mobile_scanner: ^6.0.2
  path: ^1.9.0
  path_provider: ^2.1.5
  retrofit: ">=4.4.1"
  riverpod_annotation: ^3.0.0
  sentry_flutter: ^9.0.0
  shared_preferences: ^2.3.4
  shimmer: ^3.0.0
  sqlite3_flutter_libs: ^0.5.28
  url_launcher: ^6.3.1
  uuid: ^4.5.1

dev_dependencies:
  build_runner: ^2.4.13
  drift_dev: ^2.22.1
  flutter_test:
    sdk: flutter
  freezed: ^3.0.0
  json_serializable: ^6.8.0
  mocktail: ^1.0.4
  retrofit_generator: ^10.0.0
  riverpod_generator: ^3.0.0
  very_good_analysis: ^6.0.0

flutter:
  generate: true
  uses-material-design: true

  assets:
    - assets/images/
    - assets/images/onboarding/
    - assets/images/empty_states/
    - assets/images/icons/
