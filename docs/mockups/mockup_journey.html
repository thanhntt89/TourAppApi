<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KM0 - Journey Mockup</title>
    <style>
        body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background: #f5f5f5; display: flex; justify-content: center; height: 100vh; }
        .device { width: 375px; height: 812px; background: white; position: relative; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.2); border-radius: 40px; border: 8px solid #222; margin-top: 20px; }
        .header { background: #D81B60; color: white; padding: 50px 20px 20px; text-align: center; }
        .header h1 { margin: 0; font-size: 22px; }
        .header-sub { margin: 5px 0 0; font-size: 14px; opacity: 0.8; }
        .content-section { padding: 20px; overflow-y: auto; height: calc(100% - 200px); background: #fafafa; }
        .timeline { position: relative; padding-left: 30px; margin-top: 10px; }
        .timeline::before { content: ''; position: absolute; left: 13px; top: 0; bottom: 0; width: 2px; background: #E0E0E0; }
        .timeline-item { position: relative; margin-bottom: 25px; }
        .marker { position: absolute; left: -30px; width: 24px; height: 24px; border-radius: 50%; background: white; border: 2px solid #D81B60; display: flex; align-items: center; justify-content: center; font-size: 12px; }
        .marker.visited { background: #D81B60; color: white; }
        .timeline-card { background: white; padding: 15px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        .timeline-title { margin: 0 0 5px; font-size: 16px; font-weight: bold; color: #333; }
        .timeline-status { margin: 0; font-size: 12px; color: #4CAF50; font-weight: bold; }
        .timeline-status.pending { color: #9E9E9E; }
        .btn-edit { background: white; color: #D81B60; border: 1px solid #D81B60; padding: 8px 15px; border-radius: 20px; font-size: 14px; font-weight: bold; display: block; margin: 20px auto; width: fit-content; }
        .bottom-nav { position: absolute; bottom: 0; width: 100%; background: white; display: flex; justify-content: space-around; padding: 15px 0 25px; border-top: 1px solid #eee; }
        .nav-item { text-align: center; font-size: 10px; color: #757575; display: flex; flex-direction: column; align-items: center; gap: 4px; }
        .nav-item.active { color: #D81B60; }
        .nav-icon { width: 24px; height: 24px; background: #ccc; border-radius: 50%; }
        .nav-item.active .nav-icon { background: #D81B60; }
        .qr-fab { position: absolute; bottom: 35px; left: 50%; transform: translateX(-50%); width: 60px; height: 60px; background: #333; border-radius: 30px; display: flex; justify-content: center; align-items: center; color: white; font-size: 24px; box-shadow: 0 5px 15px rgba(0,0,0,0.3); z-index: 10; border: 4px solid white; }
    </style>
</head>
<body>
    <div class="device">
        <div class="header">
            <h1>My Journey</h1>
            <p class="header-sub">3 of 10 locations visited</p>
        </div>
        
        <div class="content-section">
            <button class="btn-edit">✏️ Edit Journey Plan</button>
            
            <div class="timeline">
                <div class="timeline-item">
                    <div class="marker visited">✓</div>
                    <div class="timeline-card">
                        <h3 class="timeline-title">KM0 Milestone</h3>
                        <p class="timeline-status">Visited • 2 hours ago</p>
                    </div>
                </div>
                
                <div class="timeline-item">
                    <div class="marker visited">✓</div>
                    <div class="timeline-card">
                        <h3 class="timeline-title">Quan Ba Heaven Gate</h3>
                        <p class="timeline-status">Visited • 1 hour ago</p>
                    </div>
                </div>
                
                <div class="timeline-item">
                    <div class="marker">3</div>
                    <div class="timeline-card">
                        <h3 class="timeline-title">Yen Minh Pine Forest</h3>
                        <p class="timeline-status pending">Planned</p>
                    </div>
                </div>
                
                <div class="timeline-item">
                    <div class="marker">4</div>
                    <div class="timeline-card">
                        <h3 class="timeline-title">Dinh Vua Mèo</h3>
                        <p class="timeline-status pending">Planned</p>
                    </div>
                </div>
            </div>
        </div>
        
        <div class="qr-fab">QR</div>
        
        <div class="bottom-nav">
            <div class="nav-item">
                <div class="nav-icon"></div>
                Home
            </div>
            <div class="nav-item active">
                <div class="nav-icon"></div>
                Journey
            </div>
            <div class="nav-item" style="opacity: 0; width: 40px;"></div>
            <div class="nav-item">
                <div class="nav-icon"></div>
                Saved
            </div>
            <div class="nav-item">
                <div class="nav-icon"></div>
                More
            </div>
        </div>
    </div>
</body>
</html>
