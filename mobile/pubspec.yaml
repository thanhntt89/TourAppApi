name: toursapp
description: "Tour Guide trong túi — Your Personal Tour Guide for Vietnamese provinces"
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"
  flutter: ">=3.22.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # --- HTTP & Networking ---
  dio: ^5.4.3
  connectivity_plus: ^6.0.3

  # --- State Management ---
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # --- Routing ---
  go_router: ^14.2.0

  # --- Offline Database ---
  drift: ^2.18.0
  sqlite3_flutter_libs: ^0.5.22
  path_provider: ^2.1.3

  # --- Models & Serialization ---
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0

  # --- Map ---
  flutter_map: ^7.0.2
  flutter_map_tile_caching: ^9.1.0
  latlong2: ^0.9.1
  flutter_map_marker_cluster: ^1.4.0

  # --- GPS & Location ---
  geolocator: ^13.0.1
  permission_handler: ^11.3.1

  # --- Audio ---
  just_audio: ^0.9.40
  audio_service: ^0.18.15
  audio_session: ^0.1.21

  # --- QR Scanner ---
  mobile_scanner: ^5.2.3

  # --- UI & UX ---
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  flutter_animate: ^4.5.0
  photo_view: ^0.15.0
  flutter_svg: ^2.0.10

  # --- Utilities ---
  share_plus: ^9.0.0
  url_launcher: ^6.3.0
  package_info_plus: ^8.0.2
  intl: ^0.19.0
  uuid: ^4.4.0
  shared_preferences: ^2.3.2

  # --- Environment ---
  envied: ^0.5.4+1

  # --- Monitoring ---
  sentry_flutter: ^8.8.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

  # --- Code Generation ---
  build_runner: ^2.4.11
  riverpod_generator: ^2.4.3
  freezed: ^2.5.7
  json_serializable: ^6.8.0
  drift_dev: ^2.18.0
  envied_generator: ^0.5.4+1

  # --- Testing ---
  mocktail: ^1.0.4

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/

  # fonts:
  #   - family: Outfit
  #     fonts:
  #       - asset: assets/fonts/Outfit-Regular.ttf
  #       - asset: assets/fonts/Outfit-Bold.ttf
  #         weight: 700

  generate: true  # Enable l10n code generation
